<div class="app-shell" [class.sidebar-collapsed]="isSidebarCollapsed()">

  <!-- ════════════ SIDEBAR ════════════ -->
  <aside class="sidebar">
    <!-- Logo / Brand -->
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#1B3A6B"/>
          <path d="M8 10h16M8 16h10M8 22h13" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <span class="brand-name">GestionCongé</span>
        <span class="brand-tag">Congés & absences</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <span class="nav-section-label">NAVIGATION</span>
      <ul>
        <li *ngFor="let item of navItems">
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            class="nav-link"
            [title]="item.label"
          >
            <span class="nav-icon"><app-nav-icon [name]="item.icon" /></span>
            <span class="nav-label">{{ item.label }}</span>
            <span class="active-indicator"></span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- User Info -->
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">{{ currentUser.avatar }}</div>
        <div class="user-info">
          <span class="user-name">{{ currentUser.nom }}</span>
          <span class="user-role">{{ currentUser.departement }}</span>
        </div>
      </div>
      <button type="button" class="logout-btn" title="Se déconnecter" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Collapse Toggle -->
    <button class="collapse-btn" (click)="toggleSidebar()" [title]="isSidebarCollapsed() ? 'Agrandir' : 'Réduire'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline [attr.points]="isSidebarCollapsed() ? '9 18 15 12 9 6' : '15 18 9 12 15 6'"/>
      </svg>
    </button>
  </aside>

  <!-- ════════════ MAIN CONTENT ════════════ -->
  <div class="main-wrapper">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-root">GestionCongé</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Espace Admin</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-action" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge">3</span>
        </button>
        <div class="topbar-user">
          <div class="topbar-avatar">{{ currentUser.avatar }}</div>
          <span class="topbar-name">{{ currentUser.nom }}</span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
