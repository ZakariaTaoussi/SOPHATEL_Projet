<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Mon Profil</h1>
      <p class="page-subtitle">Informations personnelles et soldes de conges.</p>
    </div>
    <button class="btn-edit" (click)="editMode = !editMode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      {{ editMode ? 'Annuler' : 'Modifier' }}
    </button>
  </div>

  <div class="profile-grid">
    <div class="card identity-card">
      <div class="avatar-section">
        <div class="profile-avatar">{{ profil.avatar }}</div>
        <div class="identity-info">
          <h2 class="identity-name">{{ profil.prenom }} {{ profil.nom }}</h2>
          <span class="identity-poste">{{ profil.poste }}</span>
          <span class="identity-dept">{{ profil.departement }}</span>
        </div>
      </div>

      <div class="meta-list">
        <div class="meta-item">
          <span class="meta-label">Matricule</span>
          <span class="meta-value mono">{{ profil.matricule }}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Date d'embauche</span>
          <span class="meta-value">{{ profil.dateEmbauche }}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Manager</span>
          <span class="meta-value">{{ profil.manager }}</span>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Coordonnees</h3>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Prenom</label>
            <input class="form-input" [class.readonly]="!editMode" [readonly]="!editMode" [(ngModel)]="profil.prenom" name="prenom" />
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input class="form-input" [class.readonly]="!editMode" [readonly]="!editMode" [(ngModel)]="profil.nom" name="nom" />
          </div>
          <div class="form-group full-width">
            <label class="form-label">Email</label>
            <input class="form-input" [class.readonly]="!editMode" [readonly]="!editMode" [(ngModel)]="profil.email" name="email" />
          </div>
          <div class="form-group full-width">
            <label class="form-label">Telephone</label>
            <input class="form-input" [class.readonly]="!editMode" [readonly]="!editMode" [(ngModel)]="profil.telephone" name="tel" />
          </div>
        </div>
        <div class="form-actions" *ngIf="editMode">
          <button class="btn-primary" (click)="editMode = false">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>
</div>
