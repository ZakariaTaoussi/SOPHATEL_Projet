<div class="notification-page">
  <header class="page-header">
    <div>
      <h1>Notifications</h1>
      <p>Centre de notifications du système</p>
    </div>

    <button type="button" class="mark-read-btn" (click)="markAllAsRead()">
      Tout marquer comme lu
    </button>
  </header>

  <section class="notification-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <div>
        <h2>Non lues ({{ unreadNotifications.length }})</h2>
        <p>Notifications nécessitant votre attention</p>
      </div>
    </div>

    <div class="notification-list">
      <article
        class="notification-item"
        *ngFor="let notification of notifications"
        [class.is-read]="notification.read"
      >
        <span class="notification-icon" [attr.data-kind]="notification.kind">
          <svg *ngIf="notification.kind === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4"/>
            <path d="M12 8h.01"/>
          </svg>
          <svg *ngIf="notification.kind === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          <svg *ngIf="notification.kind === 'warning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <path d="M12 9v4"/>
            <path d="M12 17h.01"/>
          </svg>
        </span>

        <div class="notification-content">
          <h3>{{ notification.title }}</h3>
          <p>{{ notification.date }}</p>
        </div>

        <span class="unread-dot" *ngIf="!notification.read"></span>
      </article>
    </div>
  </section>
</div>
