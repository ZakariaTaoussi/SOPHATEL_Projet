<div class="page-wrapper">
  <div class="page-header">
    <div>
      <span class="page-kicker">GestionCongé</span>
      <h1 class="page-title">Tableau de bord</h1>
      <p class="page-subtitle">Vue globale des demandes, absences et validations finales.</p>
    </div>
    <a routerLink="/directeur-general/demandes-a-valider" class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Demandes à valider
    </a>
  </div>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats" [attr.data-color]="stat.color">
      <span class="stat-label">{{ stat.label }}</span>
      <div class="stat-value">
        {{ stat.value }}
        <span class="stat-unit">{{ stat.unit }}</span>
      </div>
    </div>
  </div>

  <div class="content-grid">
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Dernières demandes</h2>
        <a routerLink="/directeur-general/demandes-a-valider" class="card-link">Voir tout</a>
      </div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Période</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of recentDemandes">
              <td class="type-cell">{{ d.type }}</td>
              <td class="date-cell">{{ d.dateDebut }} - {{ d.dateFin }}</td>
              <td>
                <span class="badge" [attr.data-status]="d.statutClass">{{ d.statut }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>
</div>
