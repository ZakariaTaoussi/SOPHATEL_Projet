<main class="login">
  <aside class="login__brand">
    <div class="login__logo">
      <span class="login__logo-mark">G</span>
      <span>GestionConge</span>
    </div>

    <div class="login__hero">
      <p class="login__eyebrow">Nouveau mot de passe</p>
      <h1>Protegez votre acces.</h1>
      <p>Choisissez un mot de passe robuste pour reprendre votre session en toute confiance.</p>
    </div>
  </aside>

  <section class="login__panel">
    <div class="login__form-wrap">
      <header class="login__header">
        <span class="login__mobile-brand">GestionConge</span>
        <h2>Creer un nouveau mot de passe</h2>
      </header>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="field">
          <label for="newPassword">Nouveau mot de passe</label>
          <input
            id="newPassword"
            type="password"
            formControlName="newPassword"
            placeholder="Minimum 8 caracteres"
            autocomplete="new-password"
          />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            placeholder="Confirmez le mot de passe"
            autocomplete="new-password"
          />
        </div>

        <p class="form__success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="form__error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button type="submit" class="btn-primary" [disabled]="isLoading || resetForm.disabled">
          {{ isLoading ? 'Reinitialisation...' : 'Reinitialiser' }}
        </button>

        <a class="btn-secondary" routerLink="/auth/login" *ngIf="successMessage">Se connecter</a>
        <a class="btn-secondary" routerLink="/auth/forgot-password" *ngIf="errorMessage && !successMessage">
          Refaire une demande
        </a>
      </form>
    </div>
  </section>
</main>
