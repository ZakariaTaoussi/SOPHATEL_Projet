spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# PostgreSQL Neon
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Avoid printing sensitive connection details in startup logs
logging.level.org.hibernate.orm.connections.pooling=warn
logging.level.org.springframework.core.env.PropertySourcesPropertyResolver=info

# Port Spring Boot
server.port=8081

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}

# NATS notifications
nats.url=${NATS_URL:nats://localhost:4222}
nats.subject.demande-events=${NATS_SUBJECT:sophatel.demande.events}
nats.enabled=${NATS_ENABLED:true}

# Brevo SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Password reset
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.reset-password-token-expiration-minutes=${RESET_PASSWORD_TOKEN_EXPIRATION_MINUTES:30}
app.mail.from=${APP_MAIL_FROM}
